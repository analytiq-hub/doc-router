name: Release

# Triggered on any v* tag — covers stable releases (v1.2.3) and candidates (v1.2.3-rc.1).
# Runs existing test workflows first, then builds and pushes images to ghcr.io.
# :latest is only updated for stable releases (vX.Y.Z with no suffix).
# Helm chart publishing is manual: ./deploy/scripts/publish-chart.sh <overlay>

on:
  push:
    tags:
      - 'v*'

jobs:
  test-backend:
    uses: ./.github/workflows/backend-tests.yml

  test-frontend:
    uses: ./.github/workflows/frontend-build.yml

  build-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          TAG="${{ github.ref_name }}"
          FRONTEND="ghcr.io/analytiq-hub/doc-router-frontend"
          BACKEND="ghcr.io/analytiq-hub/doc-router-backend"
          FRONTEND_TAGS="${FRONTEND}:${TAG}"
          BACKEND_TAGS="${BACKEND}:${TAG}"
          # Only push :latest for stable releases (no pre-release suffix)
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            FRONTEND_TAGS="${FRONTEND_TAGS},${FRONTEND}:latest"
            BACKEND_TAGS="${BACKEND_TAGS},${BACKEND}:latest"
          fi
          echo "frontend=${FRONTEND_TAGS}" >> $GITHUB_OUTPUT
          echo "backend=${BACKEND_TAGS}"  >> $GITHUB_OUTPUT
          echo "Tag: $TAG"
          echo "Frontend tags: ${FRONTEND_TAGS}"
          echo "Backend tags:  ${BACKEND_TAGS}"

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/shared/docker/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          build-args: NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/shared/docker/Dockerfile
          target: backend
          push: true
          tags: ${{ steps.tags.outputs.backend }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ steps.tags.outputs.frontend }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend:**  \`${{ steps.tags.outputs.backend }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To deploy: \`./deploy/scripts/k8s-deploy.sh <overlay>\`" >> $GITHUB_STEP_SUMMARY
          echo "To publish chart: \`./deploy/scripts/publish-chart.sh <overlay>\`" >> $GITHUB_STEP_SUMMARY
