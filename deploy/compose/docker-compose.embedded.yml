services:
  frontend:
    image: ghcr.io/analytiq-hub/doc-router-frontend:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: deploy/shared/docker/Dockerfile
      target: runner
      args:
        # Build-time environment
        - NODE_ENV=production
        - PUBLIC_API_URL=${PUBLIC_API_URL:-/fastapi}
    environment:
      # Runtime environment
      - ENV=${ENV:-dev}
      - MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-default_secret_for_development}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
    command: node frontend/server.js
    restart: unless-stopped
    networks:
      - doc-router-local-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  migrate:
    image: ghcr.io/analytiq-hub/doc-router-backend:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: deploy/shared/docker/Dockerfile
      target: backend
    environment:
      - ENV=${ENV:-dev}
      - MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    command: sh -c "cd /app/packages/python && python3 migrate.py"
    networks:
      - doc-router-local-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"

  backend:
    image: ghcr.io/analytiq-hub/doc-router-backend:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: deploy/shared/docker/Dockerfile
      target: backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Runtime environment
      - ENV=${ENV:-dev}
      - MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-default_secret_for_development}
      - FASTAPI_SECRET=${FASTAPI_SECRET:-${NEXTAUTH_SECRET}} # Obsolete, will be removed
      - FASTAPI_ROOT_PATH=${FASTAPI_ROOT_PATH:-/fastapi}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - DOCROUTER_WORKERS_ENABLED=0
      - N_UVICORN_WORKERS=${N_UVICORN_WORKERS:-1}
      - CORS_ORIGINS_EXTRA=${CORS_ORIGINS_EXTRA}
      - FLOW_CODE_EXTERNAL_ALLOW=${FLOW_CODE_EXTERNAL_ALLOW}
      - FLOW_CODE_BUILTINS_DENY=${FLOW_CODE_BUILTINS_DENY}
      - FLOW_CODE_BLOCK_ENV_ACCESS=${FLOW_CODE_BLOCK_ENV_ACCESS}
    command: sh -c "cd /app/packages/python && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${N_UVICORN_WORKERS:-1}"
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - doc-router-local-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  queue-worker:
    image: ghcr.io/analytiq-hub/doc-router-backend:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: deploy/shared/docker/Dockerfile
      target: backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - ENV=${ENV:-dev}
      - MONGODB_URI=mongodb://mongodb:27017/?directConnection=true
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-default_secret_for_development}
      - FASTAPI_SECRET=${FASTAPI_SECRET:-${NEXTAUTH_SECRET}} # Obsolete, will be removed
      - FASTAPI_ROOT_PATH=${FASTAPI_ROOT_PATH:-/fastapi}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      - CORS_ORIGINS_EXTRA=${CORS_ORIGINS_EXTRA}
      - FLOW_CODE_EXTERNAL_ALLOW=${FLOW_CODE_EXTERNAL_ALLOW}
      - FLOW_CODE_BUILTINS_DENY=${FLOW_CODE_BUILTINS_DENY}
      - FLOW_CODE_BLOCK_ENV_ACCESS=${FLOW_CODE_BLOCK_ENV_ACCESS}
    command: sh -c "cd /app/packages/python && exec python3 worker/worker.py"
    restart: unless-stopped
    networks:
      - doc-router-local-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  mongodb:
    # MongoDB Atlas Local image with full vector search support
    # Includes mongot (vector search) process - no additional configuration needed
    # hostname is pinned so the replica set member address stays consistent across restarts
    hostname: mongodb
    image: mongodb/mongodb-atlas-local:latest
    environment:
      # Optional: Set mongot log output (useful for debugging)
      MONGOT_LOG_FILE: /dev/stdout
      RUNNER_LOG_FILE: /dev/stdout
    ports:
      - "27018:27017" # external_port:internal_port
    networks:
      - doc-router-local-network
    volumes:
      - doc-router-local-mongodb:/data/db
      - doc-router-local-mongodb-configdb:/data/configdb
    # No custom command - mongodb-atlas-local has its own startup process
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.adminCommand('hello').isWritablePrimary ? 0 : 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - doc-router-local-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  doc-router-local-network:
    driver: bridge

volumes:
  doc-router-local-mongodb:
  doc-router-local-mongodb-configdb: