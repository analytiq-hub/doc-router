# Kind-specific Helm value overrides — committed, no secrets.
# Secrets are created by deploy-kind.sh from .env + .env.kind at deploy time.
# MongoDB is deployed separately in the 'mongo' namespace by deploy-kind.sh.

image:
  frontend:
    pullPolicy: Never   # images are kind load-ed, not pulled from a registry
  backend:
    pullPolicy: Never

ingress:
  host: localhost
  tls: false            # no cert-manager on Kind

replicaCount:
  frontend: 1
  backend: 1

config:
  environment: dev
  nextauthUrl: "http://localhost"
