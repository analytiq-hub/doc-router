# Kind-specific Helm values — committed, no secrets.
# Secrets are created by deploy-kind.sh from .env + .env.kind at deploy time.

image:
  frontend:
    pullPolicy: Never   # images are kind load-ed, not pulled from a registry
  backend:
    pullPolicy: Never

ingress:
  host: localhost
  tls: false            # no cert-manager on Kind

mongodb:
  storageClassName: ""  # use Kind's default storage class

replicaCount:
  frontend: 1
  backend: 1

config:
  environment: dev
  nextauthUrl: "http://localhost"
  nextPublicFastapiUrl: "http://localhost/fastapi"
  fastapiRootPath: "/fastapi"
  nWorkers: "4"
