apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-router-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "doc-router.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.config.environment | quote }}
  NEXTAUTH_URL: {{ .Values.config.nextauthUrl | quote }}
  PUBLIC_API_URL: {{ required "config.publicApiUrl is required" .Values.config.publicApiUrl | quote }}
  FASTAPI_ROOT_PATH: {{ .Values.config.fastapiRootPath | quote }}
  FASTAPI_BACKEND_URL: {{ printf "http://backend.%s.svc.cluster.local:8000" .Release.Namespace | quote }}
  N_DOCROUTER_WORKERS: {{ .Values.config.nDocrouterWorkers | quote }}
  N_UVICORN_WORKERS: {{ .Values.config.nUvicornWorkers | quote }}
  AWS_S3_BUCKET_NAME: {{ .Values.config.appBucketName | quote }}
  AWS_REGION: {{ .Values.config.region | quote }}
  CORS_ORIGINS_EXTRA: {{ .Values.config.corsOriginsExtra | quote }}
{{- if .Values.config.flowCodeExternalAllow }}
  FLOW_CODE_EXTERNAL_ALLOW: {{ .Values.config.flowCodeExternalAllow | quote }}
{{- end }}
{{- if .Values.config.flowCodeBuiltinsDeny }}
  FLOW_CODE_BUILTINS_DENY: {{ .Values.config.flowCodeBuiltinsDeny | quote }}
{{- end }}
{{- if .Values.config.flowCodeBlockEnvAccess }}
  FLOW_CODE_BLOCK_ENV_ACCESS: {{ .Values.config.flowCodeBlockEnvAccess | quote }}
{{- end }}
